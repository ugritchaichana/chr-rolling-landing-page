name: Discord Vercel Notification

on:
  deployment_status

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run this if it's not in pending state
    if: github.event.deployment_status.state != 'pending'
    
    steps:
      - name: Send Discord Notification
        uses: actions/github-script@v7
        with:
          script: |
            const webhookUrl = 'https://discord.com/api/webhooks/1520481764370284698/ilXp4SUMxx4AHpT5scDVA_oK7UqAjOsaPJRYDNcKq6dRUSxmqk_SO04R2hSaCbY86cvp';
            
            const state = context.payload.deployment_status.state;
            const isSuccess = state === 'success';
            
            // Try to resolve branch name from the commit SHA
            let branch = context.payload.deployment.ref || 'Unknown Branch';
            try {
              const { data: branches } = await github.rest.repos.listBranchesForHeadCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.payload.deployment.sha
              });
              if (branches && branches.length > 0) {
                const mainBranch = branches.find(b => b.name === 'main');
                branch = mainBranch ? 'main' : branches[0].name;
              } else {
                // Fallback to short SHA if no branch matches exactly at HEAD
                branch = context.payload.deployment.sha.substring(0, 7);
              }
            } catch (e) {
              branch = context.payload.deployment.sha.substring(0, 7);
            }
              
            // environment_url is the actual website URL (e.g., https://my-app.vercel.app)
            // target_url is the Vercel Dashboard/Logs URL
            const webUrl = context.payload.deployment_status.environment_url || context.payload.deployment_status.target_url || 'https://vercel.com';
            const logsUrl = context.payload.deployment_status.target_url || 'https://vercel.com';
            
            // Unix Timestamp for <t:TIMESTAMP:F> in Discord
            const unixTime = Math.floor(Date.now() / 1000);
            
            let color = 3066993; // Green
            let title = "✅ Vercel Deployment Successful";
            let description = `**Branch:** \`${branch}\`\n**Website URL:** [Click to open website](${webUrl})\n**Status:** 🟢 Success\n**Time:** <t:${unixTime}:F>\n\n**Dashboard:** [View Vercel Dashboard](${logsUrl})`;
            
            if (!isSuccess) {
              color = 15158332; // Red
              title = "❌ Vercel Deployment Failed";
              description = `**Branch:** \`${branch}\`\n**Status:** 🔴 Failed / Error\n**Time:** <t:${unixTime}:F>\n\n**Error Logs:** [View Logs Here](${logsUrl})`;
            }
            
            const payload = {
              embeds: [{
                title: title,
                description: description,
                color: color
              }]
            };
            
            await fetch(webhookUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            });
